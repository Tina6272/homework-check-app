<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>一起長大島｜選擇身分</title><link rel="stylesheet" href="shared.css"><style>
:root{--ink:#24443f;--deep:#1f685f;--sea:#aee1df;--sand:#f5dfad;--leaf:#5c9d65}body{color:var(--ink);background:linear-gradient(#dff5f2 0 68%,#79c7c3 68%)}.island-shell{min-height:100vh;position:relative;overflow:hidden;padding:30px}.sun{position:absolute;right:8%;top:7%;width:110px;height:110px;border-radius:50%;background:#ffd670;box-shadow:0 0 0 24px #ffd67033}.cloud{position:absolute;left:8%;top:12%;width:130px;height:34px;border-radius:50px;background:#fff9;box-shadow:35px -18px 0 5px #fff9}.header{position:relative;z-index:3;width:min(1180px,100%);margin:auto;display:flex;justify-content:space-between;align-items:center}.brand{font-size:1.25rem;font-weight:900}.season{font-size:.86rem;color:var(--deep)}.hero{position:relative;z-index:2;width:min(1180px,100%);margin:25px auto 0;text-align:center}.eyebrow{font-size:.8rem;font-weight:900;letter-spacing:.16em;color:var(--deep)}h1{font-family:Georgia,"Noto Serif TC",serif;font-size:clamp(2.8rem,6vw,5.8rem);line-height:1.06;margin:13px 0}.lead{max-width:630px;margin:0 auto;color:#47706a;font-size:1.12rem;line-height:1.7}.land{position:relative;width:min(980px,100%);min-height:470px;margin:20px auto 0;border-radius:50% 50% 24% 24% / 32% 32% 18% 18%;background:linear-gradient(#82bd6e 0 62%,#f5dfad 63%);box-shadow:0 24px 0 #4a9f91}.tree{position:absolute;left:50%;top:7%;transform:translateX(-50%);width:28px;height:190px;border-radius:15px;background:#765034}.tree::before{content:"";position:absolute;left:50%;top:-18px;transform:translateX(-50%);width:185px;height:130px;border-radius:50%;background:radial-gradient(circle at 30% 40%,#90c676 0 24%,transparent 25%),radial-gradient(circle at 64% 34%,#4e9660 0 31%,transparent 32%),radial-gradient(circle at 50% 70%,#6dad66 0 38%,transparent 39%)}.role-button{position:absolute;width:230px;padding:18px 20px;border:3px solid #fff;border-radius:999px;background:#ffffffeb;color:var(--ink);text-align:left;box-shadow:0 12px 26px #285e4e32}.role-button strong{display:block;font-size:1.1rem}.role-button span{display:block;margin-top:4px;color:#517069;font-size:.86rem}.role-button::after{content:"";position:absolute;width:70px;height:3px;background:#fff;top:50%}.student{left:5%;bottom:14%}.student::after{right:-65px;transform:rotate(-15deg)}.teacher{right:5%;bottom:14%}.teacher::after{left:-65px;transform:rotate(15deg)}.parent{left:50%;bottom:2%;transform:translateX(-50%)}.parent:hover{transform:translateX(-50%) translateY(-3px)}.parent::after{display:none}.role-dot{float:left;display:grid;place-items:center;width:48px;height:48px;margin-right:10px;border-radius:50%;background:#dff3e2;font-size:24px}.privacy{position:relative;z-index:3;justify-content:center;margin:34px auto 0;color:#244f49}.privacy svg{color:var(--deep)}@media(max-width:720px){.island-shell{padding:22px 14px}.season{display:none}.cloud{display:none}h1{font-size:3.1rem}.land{min-height:auto;background:none;box-shadow:none;border-radius:0;display:grid;gap:12px;padding-top:190px}.tree{top:0;height:150px}.tree::before{width:150px;height:100px}.role-button{position:relative;inset:auto!important;transform:none!important;width:100%;border-color:#c8e1d1}.role-button::after{display:none}.privacy{font-size:.76rem;margin-top:20px}.sun{width:76px;height:76px}} 
</style></head><body><a class="skip-link" href="#roles">跳到身分選擇</a><main class="island-shell"><div class="sun" aria-hidden="true"></div><div class="cloud" aria-hidden="true"></div><header class="header"><div class="brand">🌱 一起長大島</div><div class="season">每天一點點，都算成長</div></header><section class="hero"><div class="eyebrow">WELCOME TO GROWTH ISLAND</div><h1>從自己的小徑，<br>走進同一座成長島</h1><p class="lead">學生練習自己完成，老師提供方向，家長給予安心陪伴。先找到屬於你的入口。</p><div class="land" id="roles" role="group" aria-label="選擇身分"><div class="tree" role="img" aria-label="三條小徑匯聚的原創成長樹；未來可深化為自然島嶼插畫"></div><button class="role-button student" type="button" data-role="學生"><span class="role-dot">🐾</span><strong>我是學生</strong><span>沿著任務小徑前進</span></button><button class="role-button teacher" type="button" data-role="老師"><span class="role-dot">🪴</span><strong>我是老師</strong><span>照看每一株學習幼苗</span></button><button class="role-button parent" type="button" data-role="家長"><span class="role-dot">🏕️</span><strong>我是家長</strong><span>陪伴孩子穩穩長大</span></button></div></section><footer class="privacy"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10V7a5 5 0 0110 0v3M5 10h14v10H5z"/></svg>安心使用：只使用班級與座號，不顯示學生姓名</footer></main><dialog class="dialog" data-role-dialog><div class="dialog-card"><div class="dialog-symbol">🌱</div><h2><span data-role-name></span>小徑已找到</h2><p>角色首頁將在下一階段設計。</p><button class="dialog-close" type="button" data-dialog-close>回到島上</button></div></dialog><script src="shared.js"></script></body></html>
