<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>小步學堂｜選擇身分</title><link rel="stylesheet" href="shared.css"><style>
:root{--ink:#3f352d;--cream:#fff7e8;--green:#477258;--wood:#a7643f;--sun:#f6bd54}body{color:var(--ink);background:#f4dfc8}.room{min-height:100vh;position:relative;overflow:hidden;background:linear-gradient(#f9e7d1 0 72%,#bc8057 72%);padding:30px}.room::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent 49.7%,#ffffff25 50%,transparent 50.3%);background-size:130px 100%;pointer-events:none}.header{position:relative;z-index:2;display:flex;justify-content:space-between;align-items:center;width:min(1180px,100%);margin:auto}.brand{font-size:1.25rem;font-weight:900;color:var(--green)}.time{padding:9px 15px;border-radius:8px;background:#fff8;border:1px solid #a7643f33}.board{position:relative;z-index:1;width:min(940px,100%);margin:46px auto 0;padding:40px clamp(22px,5vw,58px) 48px;border:14px solid var(--wood);border-radius:10px;background:#3f6b59;color:#fff;box-shadow:0 18px 0 #895034,0 30px 55px #76523b44}.board::after{content:"";position:absolute;left:15%;right:15%;bottom:-30px;height:18px;border-radius:0 0 10px 10px;background:#915735}.chalk{color:#ffe8a8;font-family:"DFKai-SB","BiauKai",cursive;letter-spacing:.08em}.board h1{text-align:center;font-size:clamp(2.3rem,5vw,4.6rem);margin:10px 0 8px}.board>p{text-align:center;color:#e7f1e9;font-size:1.1rem;line-height:1.6}.doors{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:32px}.role-button{position:relative;padding:22px 15px 18px;border:8px solid #945b39;border-radius:8px 8px 2px 2px;background:#f5d49b;color:var(--ink);box-shadow:inset 0 0 0 3px #fff2d4;text-align:center}.role-button::before{content:"";display:block;width:54px;height:54px;margin:0 auto 12px;border-radius:50%;background:#fff3d1;font-size:28px;line-height:54px}.role-button.student::before{content:"🎒"}.role-button.teacher::before{content:"📚"}.role-button.parent::before{content:"☕"}.role-button strong{display:block;font-size:1.2rem}.role-button span{display:block;min-height:42px;margin-top:7px;color:#67503d;line-height:1.45}.role-button .knob{position:absolute;right:12px;bottom:38%;width:9px;height:9px;border-radius:50%;background:#6c4931}.footer{position:relative;z-index:2;width:min(940px,100%);margin:55px auto 0;display:flex;justify-content:center}.privacy{padding:10px 18px;border-radius:999px;background:#fff8;color:#5f4638}.privacy svg{color:var(--green)}.plant{position:absolute;right:5%;bottom:4%;width:90px;height:120px;background:radial-gradient(ellipse at 30% 35%,#669a61 0 28%,transparent 30%),radial-gradient(ellipse at 70% 20%,#4d8251 0 27%,transparent 29%),linear-gradient(90deg,transparent 47%,#6f4b32 48% 53%,transparent 54%)}@media(max-width:720px){.room{padding:20px 14px;background:linear-gradient(#f9e7d1 0 86%,#bc8057 86%)}.board{margin-top:28px;border-width:9px;padding:28px 18px}.doors{grid-template-columns:1fr;gap:12px}.role-button{display:grid;grid-template-columns:64px 1fr;text-align:left;align-items:center;padding:12px 18px}.role-button::before{grid-row:1/3;margin:0}.role-button strong,.role-button span{grid-column:2}.role-button span{min-height:auto}.role-button .knob{display:none}.footer{margin-top:45px}.plant{display:none}.time{display:none}.privacy{font-size:.76rem}}
</style></head><body><a class="skip-link" href="#roles">跳到身分選擇</a><main class="room"><header class="header"><div class="brand">☀ 小步學堂</div><div class="time">放學後，也能安心學習</div></header><section class="board"><div class="chalk">WELCOME TO OUR CLASS</div><h1>今天，你從哪扇門進來？</h1><p>學生、老師和家長，都有一個舒服又清楚的位置。</p><div class="doors" id="roles"><button class="role-button student" type="button" data-role="學生"><strong>我是學生</strong><span>回到座位，開始今天的功課</span><i class="knob" aria-hidden="true"></i></button><button class="role-button teacher" type="button" data-role="老師"><strong>我是老師</strong><span>走進教室，照看班級學習</span><i class="knob" aria-hidden="true"></i></button><button class="role-button parent" type="button" data-role="家長"><strong>我是家長</strong><span>來到門口，了解孩子的今天</span><i class="knob" aria-hidden="true"></i></button></div></section><footer class="footer"><div class="privacy"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10V7a5 5 0 0110 0v3M5 10h14v10H5z"/></svg>安心使用：只使用班級與座號，不顯示學生姓名</div></footer><div class="plant" role="img" aria-label="教室角落的原創盆栽圖形；未來可深化為溫暖教室插畫"></div></main><dialog class="dialog" data-role-dialog><div class="dialog-card"><div class="dialog-symbol">🔔</div><h2><span data-role-name></span>的門已找到</h2><p>角色首頁將在下一階段設計。</p><button class="dialog-close" type="button" data-dialog-close>回到教室</button></div></dialog><script src="shared.js"></script></body></html>
