<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>日日學習冊｜選擇身分</title><link rel="stylesheet" href="shared.css"><style>

tton:nth-child(2){margin-left:30px}.role-button:nth-child(3){margin-left:60px}.icon{display:grid;place-items:center;width:52px;height:52px;border-radius:50%;font-size:25px;background:#f5e2bc}.role-button strong{display:block;font-size:1.14rem}.role-button small{display:block;margin-top:5px;color:#746758;font-size:.9rem}.arrow{font-size:1.4rem;color:var(--red)}.note{margin-top:auto;padding-top:28px}.privacy{color:#695e52}.privacy svg{color:var(--green)}.ribbon{position:absolute;right:42px;top:0;width:38px;height:92px;background:var(--red);clip-path:polygon(0 0,100% 0,100% 100%,50% 76%,0 100%)}@media(max-width:820px){.book{grid-template-columns:1fr}.book::before{display:none}.cover{padding:38px}.stamp-art{height:150px}.pages{padding:38px}.role-button:nth-child(n){margin-left:0}}@media(max-width:480px){.desk{padding:14px}.book{border-radius:12px}.cover,.pages{padding:28px 22px}.cover h1{font-size:3rem}.stamp-art{height:120px}.stamp-art::before{width:96px;height:96px;border-width:5px}.role-button{grid-template-columns:46px 1fr;padding:12px}.icon{width:44px;height:44px}.arrow{display:none}.privacy{font-size:.78rem}}
</style></head><body><a class="skip-link" href="#roles">跳到身分選擇</a><main class="desk"><article class="book"><span class="ribbon" aria-hidden="true"></span><section class="cover"><div class="label">MY LEARNING PASSPORT</div><h1>日日<br>學習冊</h1><p class="lead">每天完成一小步，慢慢走出自己的學習路。</p><div class="stamp-art" role="img" aria-label="原創圓形學習章與紙張構圖；未來可深化為手繪護照插畫"></div></section><section class="pages"><h2>今天，從哪一頁開始？</h2><p>請選擇你的身分，翻到專屬頁面。</p><div class="roles" id="roles"><button class="role-button" type="button" data-role="學生"><span class="icon">✏️</span><span><strong>我是學生</strong><small>打開今天的學習頁</small></span><span class="arrow">→</span></button><button class="role-button" type="button" data-role="老師"><span class="icon">📎</span><span><strong>我是老師</strong><small>整理班級與學習進度</small></span><span class="arrow">→</span></button><button class="role-button" type="button" data-role="家長"><span class="icon">💌</span><span><strong>我是家長</strong><small>閱讀孩子的成長回條</small></span><span class="arrow">→</span></button></div><div class="note"><div class="privacy"><svg aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10V7a5 5 0 0110 0v3M5 10h14v10H5z"/></svg>安心使用：只使用班級與座號，不顯示學生姓名</div></div></section></article></main><dialog class="dialog" data-role-dialog><div class="dialog-card"><div class="dialog-symbol">📖</div><h2>已翻到<span data-role-name></span>篇章</h2><p>角色首頁將在下一階段設計。</p><button class="dialog-close" type="button" data-dialog-close>闔上提示</button></div></dialog><script src="shared.js"></script></body></html>
